<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreFrame — Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0D0D0D; color: #F2F2F2; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1E1E1E; border-radius: 16px; padding: 32px; max-width: 400px; width: 90%; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #999; font-size: 14px; margin-bottom: 24px; }
        .logo { color: #FF9640; font-size: 28px; font-weight: 800; margin-bottom: 16px; }
        .logo span { color: #F2F2F2; }
        input { width: 100%; padding: 12px 14px; border: 1px solid #333; border-radius: 8px; background: #272727; color: #F2F2F2; font-size: 15px; margin-bottom: 12px; outline: none; }
        input:focus { border-color: #FF9640; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
        .btn-primary { background: #FF9640; color: #1A1A1A; }
        .btn-primary:hover { background: #FFa860; }
        .btn-primary:disabled { background: #555; color: #999; cursor: not-allowed; }
        .error { color: #FF5252; font-size: 13px; margin-bottom: 12px; display: none; }
        .success { color: #4CAF50; font-size: 14px; text-align: center; }
        .success a { color: #FF9640; text-decoration: none; font-weight: 600; }
        #resetForm, #successMsg, #errorMsg, #invalidMsg { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><span>Score</span>Frame</div>

        <!-- Invalid/expired link -->
        <div id="invalidMsg">
            <h1>Invalid Link</h1>
            <p class="subtitle">This password reset link is invalid or has expired. Please request a new one from the app or website.</p>
        </div>

        <!-- Reset form -->
        <div id="resetForm">
            <h1>Reset Your Password</h1>
            <p class="subtitle">Enter your new password below.</p>
            <div class="error" id="formError"></div>
            <input type="password" id="newPass" placeholder="New password" autocomplete="new-password" minlength="6">
            <input type="password" id="confirmPass" placeholder="Confirm new password" autocomplete="new-password" minlength="6">
            <button class="btn-primary" id="submitBtn" onclick="resetPassword()">Reset Password</button>
        </div>

        <!-- Success -->
        <div id="successMsg">
            <div class="success">
                <p style="font-size:32px;margin-bottom:12px;">&#x2705;</p>
                <h1>Password Reset!</h1>
                <p class="subtitle" style="color:#4CAF50;">Your password has been updated successfully.</p>
                <p style="margin-top:16px;"><a href="https://scoreframe.app/dashboard.html">Go to Dashboard</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDZ_0FYmGqI_0Z8L8FgJzBwN8wCkZcfXLk",
            authDomain: "scoreframe-deploy.firebaseapp.com",
            projectId: "scoreframe-deploy",
            storageBucket: "scoreframe-deploy.firebasestorage.app",
            messagingSenderId: "728886280072",
            appId: "1:728886280072:web:0050478669b89fc76b043d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const oobCode = params.get('oobCode');

        if (mode === 'resetPassword' && oobCode) {
            // Verify the code is valid
            try {
                const email = await verifyPasswordResetCode(auth, oobCode);
                document.getElementById('resetForm').style.display = 'block';
                document.querySelector('.subtitle').textContent = `Enter a new password for ${email}`;
            } catch (e) {
                document.getElementById('invalidMsg').style.display = 'block';
            }
        } else {
            document.getElementById('invalidMsg').style.display = 'block';
        }

        window.resetPassword = async () => {
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const errorEl = document.getElementById('formError');
            const btn = document.getElementById('submitBtn');

            errorEl.style.display = 'none';

            if (newPass.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters.';
                errorEl.style.display = 'block';
                return;
            }
            if (newPass !== confirmPass) {
                errorEl.textContent = 'Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                await confirmPasswordReset(auth, oobCode, newPass);
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            } catch (e) {
                errorEl.textContent = e.message.includes('expired') ? 'This link has expired. Please request a new one.' : 'Error: ' + e.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        };
    </script>
</body>
</html>
